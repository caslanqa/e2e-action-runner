name: Build Desktop App

# Build-only workflow: produces installers as run artifacts. It NEVER creates a
# release — publishing is owned solely by publish.yml (Electron Production &
# Release Pipeline) to avoid duplicate release assets.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target Platform"
        required: true
        default: "both"
        type: choice
        options:
          - mac
          - windows
          - both
  workflow_call:
    inputs:
      platform:
        required: true
        type: string

permissions:
  contents: write

jobs:
  # macOS build job
  build-mac:
    if: inputs.platform == 'mac' || inputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install System Dependencies (macOS)
        run: brew install pkg-config cairo pango jpeg giflib librsvg pixman

      - name: Install Node Dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Package Electron App (build only)
        run: npx electron-builder --mac --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-builders-mac
          path: |
            release/*.dmg
            release/*.zip
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error

  # Windows build job
  build-windows:
    if: inputs.platform == 'windows' || inputs.platform == 'both'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Package Electron App (build only)
        run: npx electron-builder --win --publish never

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-builders-win
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
